<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>萌萌天氣站</title>
<style>
*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;color:#172033;background:linear-gradient(135deg,#c8efff,#f7fcff 48%,#fff0f7 76%,#fff2b8);overflow-x:hidden}
.page{width:min(1280px,calc(100% - 24px));margin:auto;padding:12px 0 26px}
.nav{display:flex;justify-content:space-between;align-items:center;gap:18px;background:rgba(255,255,255,.88);border-radius:28px;padding:16px 22px;box-shadow:0 16px 40px rgba(70,130,170,.14);margin-bottom:18px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:12px;font-weight:950;color:#ec4899;font-size:clamp(23px,3vw,34px)}
.sun-logo{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;background:#ffd84d;border:3px solid #172033;box-shadow:0 0 0 5px #fff5b7}
.pill{padding:11px 18px;border-radius:999px;background:#ffe69d;color:#b45309;font-weight:900}
.layout{display:grid;grid-template-columns:1.52fr .88fr;gap:18px}
.panel{position:relative;overflow:hidden;border-radius:30px;background:rgba(255,255,255,.86);box-shadow:0 20px 50px rgba(70,130,170,.16);backdrop-filter:blur(12px)}
.hero{min-height:355px;padding:30px 26px 24px}
.ask{display:inline-flex;background:#fce7f3;color:#be185d;border-radius:999px;padding:11px 18px;font-weight:950;margin-bottom:22px}
h1{margin:0;font-size:clamp(44px,6.2vw,84px);line-height:.96;letter-spacing:-3px;position:relative;z-index:2}
.pink{color:#ec4899}
.hero-photo{position:absolute;right:0;top:0;width:45%;height:100%;object-fit:cover;object-position:center;border-radius:0 30px 30px 0;z-index:1}
.hero::after{content:"";position:absolute;right:32%;top:0;width:28%;height:100%;background:linear-gradient(90deg,rgba(255,255,255,1),rgba(255,255,255,.72),rgba(255,255,255,0));z-index:1}
.doodle1{position:absolute;right:42%;top:36px;font-size:72px;z-index:3;animation:spin 9s linear infinite}

@keyframes spin{to{transform:rotate(360deg)}}
.search-wrap{position:relative;z-index:5;width:68%;margin-top:28px}
.search{display:flex;gap:12px;background:white;border-radius:24px;padding:9px;box-shadow:0 12px 28px rgba(15,23,42,.13)}
input{flex:1;border:0;outline:0;border-radius:18px;background:#f8fafc;padding:17px;font-size:17px;color:#172033;min-width:0}
button{border:0;border-radius:18px;background:#ec4899;color:white;font-size:17px;font-weight:950;padding:0 25px;cursor:pointer;box-shadow:inset 0 -3px 0 rgba(0,0,0,.18);white-space:nowrap}
.status{margin-top:12px;color:#008a7a;font-weight:950}
.weather{margin-top:18px;min-height:320px;padding:26px 28px 0}
.location{font-size:24px;font-weight:950;margin-bottom:20px}
.big-temp{font-size:clamp(76px,10vw,132px);font-weight:950;line-height:.9;letter-spacing:-4px}
.weather-type{display:flex;align-items:center;gap:16px;font-size:26px;font-weight:900;margin-top:14px}
.weather-icon{font-size:64px}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:28px;padding-bottom:24px;max-width:68%}
.stat{border-radius:20px;background:rgba(255,255,255,.75);padding:12px 14px;display:flex;gap:9px;align-items:center;font-weight:800}
.stat span{display:block;color:#64748b;font-size:13px}
.stat b{font-size:21px}
.weather-photo{position:absolute;right:20px;bottom:0;width:37%;height:100%;object-fit:cover;object-position:center;border-radius:28px 28px 0 0;mask-image:linear-gradient(to right,transparent 0%,black 28%);-webkit-mask-image:linear-gradient(to right,transparent 0%,black 28%)}
.cards{margin-top:18px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.mini{border-radius:26px;padding:22px;background:rgba(255,255,255,.78);box-shadow:0 12px 32px rgba(80,130,170,.12)}
.mini:nth-child(1){background:linear-gradient(135deg,#fff2d1,#fff)}
.mini:nth-child(2){background:linear-gradient(135deg,#fce7f3,#fff)}
.mini:nth-child(3){background:linear-gradient(135deg,#dcfce7,#fff)}
.mi{font-size:34px}.mt{color:#64748b;font-weight:900;margin-top:8px}.mv{font-size:32px;font-weight:950;margin-top:8px}
.side{padding:26px}
.tip{position:relative;overflow:hidden;border-radius:24px;background:linear-gradient(135deg,#ffe69d,#fbcfe8);padding:20px;min-height:145px;margin-bottom:26px}
.tip h3{margin:0 0 8px;font-size:22px}
.tip p{max-width:62%;font-size:16px;line-height:1.65;margin:0;font-weight:700}
.tip img{position:absolute;right:0;top:0;width:38%;height:100%;object-fit:cover;border-radius:24px}
h2{font-size:28px;margin:0 0 14px}
.weekly{display:grid;gap:10px}
.day{display:grid;grid-template-columns:58px 44px 1fr 76px;gap:10px;align-items:center;background:rgba(255,255,255,.78);border:2px solid rgba(147,197,253,.25);border-radius:17px;padding:10px 13px}
.day-name{font-weight:950}.day-date{font-size:13px;color:#64748b}.day-emoji{font-size:32px;text-align:center}.day-desc{font-size:14px;color:#334155}.day-temp{font-size:22px;font-weight:950;color:#ec4899}.day-low{color:#60a5fa}
.gallery{margin-top:18px;border-radius:30px;background:rgba(255,255,255,.86);box-shadow:0 18px 46px rgba(80,130,170,.15);padding:22px}
.gallery-title{font-size:25px;font-weight:950;margin-bottom:16px}
.photo-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px}
.photo-card{height:150px;border-radius:22px;overflow:hidden;box-shadow:0 10px 22px rgba(15,23,42,.1);background:white}
.photo-card img{width:100%;height:100%;object-fit:cover}
.bottom{display:grid;grid-template-columns:1fr 260px;gap:18px;align-items:center;margin-top:22px}
.bubble{background:white;border:4px solid #a5d8ff;border-radius:999px;padding:24px 32px;text-align:center;font-size:21px;line-height:1.7;font-weight:900}
.cartoon{font-size:88px;text-align:center}
.footer{margin-top:18px;text-align:center;color:#64748b;font-weight:800}
@media(max-width:980px){.layout{grid-template-columns:1fr}.photo-grid{grid-template-columns:repeat(3,1fr)}.search-wrap{width:74%}}
@media(max-width:640px){.nav{flex-direction:column;align-items:stretch}.pill{display:none}.hero{min-height:520px;padding:24px 20px}.hero-photo{top:auto;bottom:0;width:100%;height:52%;border-radius:0 0 30px 30px;opacity:.92}.hero::after{display:none}.doodle1,.search-wrap{width:100%;margin-top:22px}.search{flex-direction:column}button{padding:15px}.weather-photo{display:none}.stat-row,.cards{grid-template-columns:1fr;max-width:100%}.tip img{display:none}.tip p{max-width:100%}.day{grid-template-columns:54px 40px 1fr}.day-desc{display:none}.photo-grid{grid-template-columns:1fr 1fr}.bottom{grid-template-columns:1fr}}

/* 手機緊湊版配置 */
@media(max-width:640px){
  .page{width:calc(100% - 14px);padding:7px 0 14px}
  .nav{border-radius:20px;padding:10px 12px;margin-bottom:10px;gap:8px}
  .logo{font-size:22px;gap:8px}
  .sun-logo{width:32px;height:32px;box-shadow:0 0 0 3px #fff5b7}
  .nav .search{padding:6px;border-radius:18px;gap:6px}
  .nav input{padding:11px 12px;font-size:14px;border-radius:14px}
  .nav button{padding:11px 13px;font-size:14px;border-radius:14px}

  .layout{gap:10px}
  .panel{border-radius:22px}
  .hero{min-height:330px;padding:16px 14px}
  .ask{padding:8px 12px;margin-bottom:10px;font-size:14px}
  h1{font-size:43px;line-height:.94;letter-spacing:-2px}
  .hero-photo{height:46%;border-radius:0 0 22px 22px}
  .status{margin-top:8px;font-size:14px}

  .weather{margin-top:10px;min-height:auto;padding:16px 16px 12px}
  .location{font-size:18px;margin-bottom:8px}
  .big-temp{font-size:70px;letter-spacing:-3px}
  .weather-type{font-size:19px;margin-top:4px;gap:8px}
  .weather-icon{font-size:40px}
  .stat-row{grid-template-columns:repeat(3,1fr);gap:6px;margin-top:12px;padding-bottom:0}
  .stat{padding:8px 6px;border-radius:14px;font-size:13px;gap:4px;justify-content:center}
  .stat span{font-size:11px}
  .stat b{font-size:15px}

  .cards{margin-top:10px;grid-template-columns:repeat(3,1fr);gap:7px}
  .mini{padding:10px 8px;border-radius:17px;min-height:92px;text-align:center}
  .mi{font-size:24px}
  .mt{font-size:12px;margin-top:4px}
  .mv{font-size:23px;margin-top:4px}

  .side{padding:14px}
  .tip{min-height:auto;padding:13px 14px;margin-bottom:12px;border-radius:18px}
  .tip h3{font-size:17px;margin-bottom:4px}
  .tip p{font-size:13px;line-height:1.5}
  h2{font-size:21px;margin-bottom:8px}
  .weekly{gap:6px}
  .day{grid-template-columns:48px 32px 1fr 52px;padding:7px 9px;border-radius:13px;gap:6px}
  .day-name{font-size:13px}
  .day-date{font-size:11px}
  .day-emoji{font-size:24px}
  .day-temp{font-size:16px}
  .day-desc{font-size:12px;display:block}

  .gallery{margin-top:10px;padding:14px;border-radius:22px}
  .gallery-title{font-size:19px;margin-bottom:10px}
  .photo-grid{grid-template-columns:repeat(3,1fr);gap:8px}
  .photo-card{height:92px;border-radius:14px}
  .bottom{margin-top:10px;gap:8px}
  .bubble{border-width:3px;border-radius:20px;padding:13px 16px;font-size:14px;line-height:1.55}
  .cartoon{font-size:54px}
  .footer{font-size:12px;margin-top:10px}
}

/* 平板也稍微壓縮 */
@media(min-width:641px) and (max-width:980px){
  .weather{min-height:auto}
  .stat-row{max-width:100%}
  .cards{gap:12px}
  .side{padding:20px}
  .day{padding:9px 12px}
}

</style>
</head>

<nav class="nav"><div class="logo"><span class="sun-logo">☀️</span>萌萌天氣站</div><div style="display:flex;align-items:center;gap:14px;flex:1;justify-content:flex-end;flex-wrap:wrap">

<script>
function weatherEmoji(code){if(code===0)return["☀️","大晴天"];if([1,2].includes(code))return["🌤️","晴時多雲"];if(code===3)return["☁️","陰天"];if([45,48].includes(code))return["🌫️","有霧"];if([51,53,55,61,63,65,80,81,82].includes(code))return["🌧️","下雨中"];if([71,73,75,85,86].includes(code))return["❄️","下雪"];if([95,96,99].includes(code))return["⛈️","雷雨"];return["🌈","天氣舒適"]}
const cityMap={"台北":"Taipei","臺北":"Taipei","台北市":"Taipei","新北":"New Taipei","台中":"Taichung","臺中":"Taichung","高雄":"Kaohsiung","台南":"Tainan","臺南":"Tainan","東京":"Tokyo","大阪":"Osaka","首爾":"Seoul","香港":"Hong Kong","新加坡":"Singapore","巴黎":"Paris","倫敦":"London","紐約":"New York","洛杉磯":"Los Angeles"};
function setTip(code,rain){const tip=document.getElementById("dailyTip"),uv=document.getElementById("uvTip"),mood=document.getElementById("moodTip");if(rain>=60||[51,53,55,61,63,65,80,81,82,95,96,99].includes(code)){tip.innerText="今天可能會下雨，記得帶小雨傘，走路也要慢慢來喔！";uv.innerText="偏低";mood.innerText="帶傘"}else if(code===0||code===1){tip.innerText="今天很適合出門玩，記得補充水分，也要做好防曬！";uv.innerText="中高";mood.innerText="超棒"}else{tip.innerText="今天雲朵陪你出門，天氣舒服，記得保持可愛笑容！";uv.innerText="中等";mood.innerText="良好"}}
async function searchWeather(){const query=document.getElementById("searchInput").value.trim();if(!query){alert("請輸入城市名稱");return}const finalQuery=cityMap[query]||query;const status=document.getElementById("status");status.innerText="正在查詢天氣中...";try{const geoRes=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(finalQuery)}&count=1&language=en&format=json`);const geoData=await geoRes.json();if(!geoData.results||geoData.results.length===0){status.innerText="找不到這個城市 🥺";return}const city=geoData.results[0];const weatherRes=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${city.latitude}&longitude=${city.longitude}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&forecast_days=7&timezone=auto`);const weather=await weatherRes.json();const current=weather.current,daily=weather.daily,info=weatherEmoji(current.weather_code),todayRain=daily.precipitation_probability_max[0]??0;document.getElementById("city").innerText=`${query} → ${city.name}${city.country?"・"+city.country:""}`;document.getElementById("temp").innerText=Math.round(current.temperature_2m);document.getElementById("feel").innerText=Math.round(current.apparent_temperature);document.getElementById("humidity").innerText=current.relative_humidity_2m;document.getElementById("wind").innerText=Math.round(current.wind_speed_10m);document.getElementById("condition").innerText=info[1];document.getElementById("mainEmoji").innerText=info[0];document.getElementById("rain").innerText=todayRain;setTip(current.weather_code,todayRain);const weeklyDiv=document.getElementById("weekly");weeklyDiv.innerHTML="";const weekNames=["週日","週一","週二","週三","週四","週五","週六"];for(let i=0;i<daily.time.length;i++){const date=new Date(daily.time[i]);const dayName=i===0?"今天":weekNames[date.getDay()];const monthDate=`${date.getMonth()+1}/${date.getDate()}`;const dailyInfo=weatherEmoji(daily.weather_code[i]);const high=Math.round(daily.temperature_2m_max[i]);const low=Math.round(daily.temperature_2m_min[i]);weeklyDiv.innerHTML+=`<div class="day"><div><div class="day-name">${dayName}</div><div class="day-date">${monthDate}</div></div><div class="day-emoji">${dailyInfo[0]}</div><div class="day-temp">${high}° / <span class="day-low">${low}°</span></div><div class="day-desc">${dailyInfo[1]}</div></div>`}status.innerText="查詢成功 ✨"}catch(error){console.error(error);status.innerText="天氣資料載入失敗 😭"}}
window.onload=searchWeather;
</script>

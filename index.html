<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>萌萌天氣站</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;
  color:#15203a;
  background:linear-gradient(135deg,#c9f0ff,#f9fdff 45%,#fff2f9 78%,#fff4c4);
}
.page{
  width:min(980px,calc(100% - 22px));
  margin:auto;
  padding:14px 0 24px;
}
.card{
  background:rgba(255,255,255,.88);
  border-radius:32px;
  box-shadow:0 18px 45px rgba(70,130,170,.14);
  backdrop-filter:blur(10px);
  margin-bottom:18px;
}
.top{
  display:grid;
  grid-template-columns:auto 1fr auto;
  gap:18px;
  align-items:center;
  padding:18px 24px;
}
.logo{
  display:flex;
  align-items:center;
  gap:13px;
  color:#ec4899;
  font-size:42px;
  font-weight:950;
  white-space:nowrap;
}
.logo-sun{
  width:58px;
  height:58px;
  border-radius:50%;
  background:#ffe066;
  border:5px solid #172033;
  display:grid;
  place-items:center;
  box-shadow:0 0 0 8px #fff5b7;
  font-size:32px;
}
.search{
  display:grid;
  grid-template-columns:1fr auto;
  gap:12px;
}
.search input{
  min-width:0;
  border:2px solid #e7edf5;
  border-radius:20px;
  background:#fff;
  padding:17px 20px;
  font-size:21px;
  outline:none;
}
.search button{
  border:0;
  border-radius:20px;
  padding:0 30px;
  color:#fff;
  background:#ec4899;
  font-size:21px;
  font-weight:950;
  cursor:pointer;
  box-shadow:inset 0 -4px 0 rgba(0,0,0,.17);
}
.pill{
  padding:13px 18px;
  border-radius:999px;
  background:#ffe69d;
  color:#b45309;
  font-weight:950;
  white-space:nowrap;
}
.hero{
  padding:28px;
}
.hero-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  margin-bottom:18px;
}
.status{
  background:#dcfce7;
  color:#15803d;
  border-radius:999px;
  padding:12px 20px;
  font-size:21px;
  font-weight:950;
}
.ask{
  background:#fce7f3;
  color:#be185d;
  border-radius:999px;
  padding:12px 20px;
  font-size:21px;
  font-weight:950;
}
.hero-body{
  display:grid;
  grid-template-columns:.68fr 1.32fr;
  gap:24px;
  align-items:center;
}
.hero-title{
  font-size:56px;
  line-height:1.2;
  font-weight:950;
  letter-spacing:-2px;
}
.pink{color:#ec4899}
.hero-img{
  width:100%;
  height:360px;
  border-radius:26px;
  object-fit:cover;
  object-position:center;
  box-shadow:0 12px 28px rgba(15,23,42,.12);
}
.weather{
  padding:28px;
}
.city{
  font-size:31px;
  font-weight:950;
  margin-bottom:20px;
}
.now{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:26px;
  align-items:center;
}
.temp{
  font-size:132px;
  font-weight:950;
  letter-spacing:-6px;
  line-height:.85;
}
.condition{
  display:flex;
  align-items:center;
  gap:13px;
  margin-top:18px;
  font-size:34px;
  font-weight:950;
}
.condition span:first-child{font-size:62px}
.stats{
  border-left:3px solid #e6edf5;
  padding-left:34px;
  display:grid;
  gap:24px;
}
.stat{
  display:grid;
  grid-template-columns:50px 1fr auto;
  align-items:center;
  gap:10px;
  font-size:26px;
  font-weight:900;
}
.stat-icon{font-size:38px}
.week{
  margin-top:28px;
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:10px;
}
.day{
  background:#fff;
  border:2px solid #edf3f8;
  border-radius:18px;
  padding:12px 6px;
  text-align:center;
  box-shadow:0 8px 18px rgba(15,23,42,.04);
}
.day-name{font-weight:950;font-size:18px}
.day-date{font-size:14px;color:#64748b;margin-top:2px}
.day-emoji{font-size:35px;margin:9px 0}
.day-temp{font-size:17px;font-weight:950}
.low{color:#60a5fa}
.mini-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  overflow:hidden;
  border-radius:22px;
  margin-top:24px;
}
.mini{
  min-height:118px;
  display:grid;
  grid-template-columns:auto 1fr;
  gap:12px;
  align-items:center;
  padding:20px;
}
.mini:nth-child(1){background:linear-gradient(135deg,#fff1f2,#fff)}
.mini:nth-child(2){background:linear-gradient(135deg,#fff8d8,#fff)}
.mini:nth-child(3){background:linear-gradient(135deg,#e8fff1,#fff)}
.mini-icon{font-size:46px}
.mini-title{font-weight:900;color:#64748b;font-size:18px}
.mini-value{font-size:32px;font-weight:950}
.gallery{
  padding:24px;
}
.gallery-title{
  font-size:28px;
  font-weight:950;
  margin-bottom:18px;
}
.photos{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:14px;
}
.photo{
  height:120px;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 8px 18px rgba(15,23,42,.11);
}
.photo img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.footer{
  text-align:center;
  color:#537391;
  font-size:18px;
  font-weight:800;
  padding:8px;
}
@media(max-width:720px){
  .page{width:calc(100% - 20px);padding:10px 0 16px}
  .card{border-radius:26px;margin-bottom:14px}
  .top{grid-template-columns:1fr;gap:12px;padding:16px}
  .logo{font-size:34px}
  .logo-sun{width:46px;height:46px;font-size:26px;box-shadow:0 0 0 5px #fff5b7}
  .search{grid-template-columns:1fr auto}
  .search input{font-size:16px;padding:13px 14px;border-radius:16px}
  .search button{font-size:16px;padding:0 17px;border-radius:16px}
  .pill{display:none}
  .hero{padding:18px}
  .hero-head{margin-bottom:14px;gap:8px}
  .status,.ask{font-size:15px;padding:9px 13px}
  .hero-body{grid-template-columns:.58fr 1.42fr;gap:12px}
  .hero-title{font-size:28px;line-height:1.25;letter-spacing:-1px}
  .hero-img{height:245px;border-radius:20px}
  .weather{padding:18px}
  .city{font-size:23px;margin-bottom:14px}
  .now{grid-template-columns:1fr 1fr;gap:12px}
  .temp{font-size:82px;letter-spacing:-4px}
  .condition{font-size:24px;margin-top:10px;gap:8px}
  .condition span:first-child{font-size:42px}
  .stats{padding-left:14px;gap:15px;border-left-width:2px}
  .stat{grid-template-columns:30px 1fr auto;font-size:17px;gap:8px}
  .stat-icon{font-size:26px}
  .week{gap:5px;margin-top:18px}
  .day{padding:8px 3px;border-radius:12px}
  .day-name{font-size:13px}
  .day-date{font-size:11px}
  .day-emoji{font-size:24px;margin:7px 0}
  .day-temp{font-size:13px}
  .mini-grid{border-radius:18px;margin-top:16px}
  .mini{min-height:78px;padding:10px;gap:7px}
  .mini-icon{font-size:30px}
  .mini-title{font-size:13px}
  .mini-value{font-size:22px}
  .gallery{padding:16px}
  .gallery-title{font-size:21px;margin-bottom:12px}
  .photos{grid-template-columns:repeat(3,1fr);gap:8px}
  .photo{height:86px;border-radius:12px}
  .footer{font-size:13px}
}
</style>
</head>

</main>

<script>
function weatherEmoji(code){
  if(code===0)return["☀️","大晴天"];
  if([1,2].includes(code))return["🌤️","晴時多雲"];
  if(code===3)return["☁️","陰天"];
  if([45,48].includes(code))return["🌫️","有霧"];
  if([51,53,55,61,63,65,80,81,82].includes(code))return["🌧️","下雨中"];
  if([71,73,75,85,86].includes(code))return["❄️","下雪"];
  if([95,96,99].includes(code))return["⛈️","雷雨"];
  return["🌈","天氣舒適"];
}
const cityMap={
  "台北":"Taipei","臺北":"Taipei","台北市":"Taipei","臺北市":"Taipei",
  "新北":"New Taipei","台中":"Taichung","臺中":"Taichung","高雄":"Kaohsiung",
  "台南":"Tainan","臺南":"Tainan","桃園":"Taoyuan","新竹":"Hsinchu",
  "東京":"Tokyo","大阪":"Osaka","首爾":"Seoul","香港":"Hong Kong",
  "新加坡":"Singapore","巴黎":"Paris","倫敦":"London","紐約":"New York",
  "洛杉磯":"Los Angeles","雪梨":"Sydney"
};
async function searchWeather(){
  const q=document.getElementById("cityInput").value.trim();
  if(!q){alert("請輸入城市名稱");return;}
  const finalQuery=cityMap[q]||q;
  const status=document.getElementById("status");
  status.innerText="查詢中...";
  try{
    const geoRes=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(finalQuery)}&count=1&language=en&format=json`);
    const geo=await geoRes.json();
    if(!geo.results||geo.results.length===0){status.innerText="找不到城市 🥺";return;}
    const city=geo.results[0];
    const res=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${city.latitude}&longitude=${city.longitude}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&forecast_days=7&timezone=auto`);
    const data=await res.json();
    const c=data.current;
    const d=data.daily;
    const info=weatherEmoji(c.weather_code);
    const rain=d.precipitation_probability_max[0]??0;

    document.getElementById("city").innerText=`${q} → ${city.name}・${city.country}`;
    document.getElementById("temp").innerText=Math.round(c.temperature_2m);
    document.getElementById("feel").innerText=Math.round(c.apparent_temperature);
    document.getElementById("humidity").innerText=c.relative_humidity_2m;
    document.getElementById("wind").innerText=Math.round(c.wind_speed_10m);
    document.getElementById("condition").innerText=info[1];
    document.getElementById("mainEmoji").innerText=info[0];
    document.getElementById("rain").innerText=rain;
    document.getElementById("uv").innerText=rain>60?"偏低":"中等";
    document.getElementById("air").innerText=rain>70?"帶傘":"良好";

    const week=document.getElementById("week");
    week.innerHTML="";
    const names=["今天","週一","週二","週三","週四","週五","週六"];
    for(let i=0;i<d.time.length;i++){
      const date=new Date(d.time[i]);
      const name=i===0?"今天":names[date.getDay()];
      const md=`${date.getMonth()+1}/${date.getDate()}`;
      const emoji=weatherEmoji(d.weather_code[i])[0];
      const hi=Math.round(d.temperature_2m_max[i]);
      const lo=Math.round(d.temperature_2m_min[i]);
      week.innerHTML+=`<div class="day"><div class="day-name">${name}</div><div class="day-date">${md}</div><div class="day-emoji">${emoji}</div><div class="day-temp">${hi}° / <span class="low">${lo}°</span></div></div>`;
    }
    status.innerText="查詢成功 ✨";
  }catch(err){
    console.error(err);
    status.innerText="載入失敗 😭";
  }
}
window.onload=searchWeather;
</script>

tElementById("humidity").innerText=current.relative_humidity_2m;document.getElementById("wind").innerText=Math.round(current.wind_speed_10m);document.getElementById("condition").innerText=info[1];document.getElementById("mainEmoji").innerText=info[0];document.getElementById("rain").innerText=todayRain;setTip(current.weather_code,todayRain);const weeklyDiv=document.getElementById("weekly");weeklyDiv.innerHTML="";const weekNames=["週日","週一","週二","週三","週四","週五","週六"];for(let i=0;i<daily.time.length;i++){const date=new Date(daily.time[i]);const dayName=i===0?"今天":weekNames[date.getDay()];const monthDate=`${date.getMonth()+1}/${date.getDate()}`;const dailyInfo=weatherEmoji(daily.weather_code[i]);const high=Math.round(daily.temperature_2m_max[i]);const low=Math.round(daily.temperature_2m_min[i]);weeklyDiv.innerHTML+=`<div class="day"><div><div class="day-name">${dayName}</div><div class="day-date">${monthDate}</div></div><div class="day-emoji">${dailyInfo[0]}</div><div class="day-temp">${high}° / <span class="day-low">${low}°</span></div><div class="day-desc">${dailyInfo[1]}</div></div>`}status.innerText="查詢成功 ✨"}catch(error){console.error(error);status.innerText="天氣資料載入失敗 😭"}}window.onload=searchWeather;</script></body></html>

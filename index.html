<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>萌萌天氣站</title>

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;
background:linear-gradient(135deg,#ffe4ef,#dff5ff 45%,#fff1b8);
min-height:100vh;
overflow-x:hidden;
color:#334155;
}

.bg{
position:fixed;
inset:0;
pointer-events:none;
overflow:hidden;
}

.ball{
position:absolute;
border-radius:999px;
filter:blur(2px);
opacity:.65;
animation:float 6s ease-in-out infinite;
}

.ball1{width:120px;height:120px;background:white;left:8%;top:14%}
.ball2{width:80px;height:80px;background:#ffc8dd;right:8%;top:20%;animation-delay:-2s}
.ball3{width:140px;height:140px;background:#fde68a;left:24%;bottom:8%;animation-delay:-1s}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(18px)}
}

.container{
max-width:1150px;
margin:auto;
padding:22px;
position:relative;
}

nav{
background:rgba(255,255,255,.7);
backdrop-filter:blur(10px);
border-radius:999px;
padding:15px 22px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 10px 30px rgba(0,0,0,.06);
margin-bottom:22px;
}

.logo{
font-size:22px;
font-weight:900;
color:#ec4899;
}

.tag{
background:#fef3c7;
padding:8px 14px;
border-radius:999px;
font-weight:700;
font-size:14px;
color:#b45309;
}

.grid{
display:grid;
grid-template-columns:1.1fr .9fr;
gap:20px;
}

.panel{
background:rgba(255,255,255,.72);
backdrop-filter:blur(12px);
border-radius:34px;
padding:28px;
box-shadow:0 24px 50px rgba(0,0,0,.08);
}

.hero{
display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
margin-bottom:24px;
}

.loc{
display:inline-flex;
gap:8px;
background:#fce7f3;
padding:8px 14px;
border-radius:999px;
font-weight:800;
color:#db2777;
margin-bottom:14px;
}

h1{
margin:0;
font-size:clamp(36px,6vw,64px);
line-height:1;
letter-spacing:-2px;
color:#1e293b;
}

.big{
width:120px;
height:120px;
border-radius:999px;
display:grid;
place-items:center;
font-size:60px;
background:linear-gradient(135deg,#fde68a,#f9a8d4);
animation:wiggle 3s ease-in-out infinite;
}

@keyframes wiggle{
0%,100%{transform:rotate(0)}
50%{transform:rotate(6deg)}
}

.search{
display:flex;
gap:12px;
background:white;
padding:10px;
border-radius:24px;
box-shadow:0 8px 24px rgba(0,0,0,.06);
margin-bottom:24px;
}

input{
flex:1;
border:none;
outline:none;
background:#f8fafc;
padding:16px;
border-radius:18px;
font-size:16px;
}

button{
border:none;
background:#f472b6;
color:white;
padding:0 24px;
border-radius:18px;
font-size:16px;
font-weight:900;
cursor:pointer;
transition:.2s;
}

button:hover{
background:#ec4899;
transform:translateY(-1px);
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

.card{
padding:20px;
border-radius:26px;
background:white;
box-shadow:0 8px 24px rgba(0,0,0,.05);
}

.sky{background:linear-gradient(135deg,#dff5ff,white)}
.pink{background:linear-gradient(135deg,#ffe4ef,white)}
.green{background:linear-gradient(135deg,#dcfce7,white)}

.label{
font-size:14px;
font-weight:800;
color:#64748b;
margin-top:8px;
}

.value{
font-size:34px;
font-weight:900;
color:#1e293b;
margin-top:5px;
}

.sub{
font-size:14px;
color:#64748b;
margin-top:5px;
}

h2{
margin-top:0;
font-size:28px;
color:#1e293b;
}

.hourly{
display:grid;
gap:12px;
}

.hour{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 18px;
background:white;
border-radius:24px;
box-shadow:0 8px 20px rgba(0,0,0,.05);
}

.hourLeft{
display:flex;
gap:12px;
align-items:center;
}

.emoji{
width:48px;
height:48px;
border-radius:18px;
background:#f0f9ff;
display:grid;
place-items:center;
font-size:24px;
}

.temp{
font-size:26px;
font-weight:900;
}

.reminder{
margin-top:18px;
padding:18px;
border-radius:26px;
background:linear-gradient(135deg,#fde68a,#fbcfe8);
line-height:1.7;
}

.loading{
margin-top:12px;
font-weight:700;
color:#0f766e;
}

footer{
text-align:center;
margin-top:20px;
font-size:13px;
color:#64748b;
}


.weekly{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:12px;
margin-top:20px;
}

.day{
background:white;
border-radius:24px;
padding:16px 12px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,.05);
}

.dayName{
font-weight:900;
color:#1e293b;
font-size:14px;
}

.dayEmoji{
font-size:30px;
margin:8px 0;
}

.dayTemp{
font-weight:900;
color:#334155;
}

.low{
color:#94a3b8;
font-size:13px;
}

@media(max-width:860px){
.weekly{grid-template-columns:repeat(2,1fr)}
}

@media(max-width:520px){
.weekly{grid-template-columns:1fr}
}

@media(max-width:860px){
.grid{grid-template-columns:1fr}
.cards{grid-template-columns:1fr}
.big{width:90px;height:90px;font-size:46px}
}

@media(max-width:520px){
.search{flex-direction:column}
button{padding:16px}
}
</style>
</head>

<body>

<div class="bg">
<div class="ball ball1"></div>
<div class="ball ball2"></div>
<div class="ball ball3"></div>
</div>

<div class="container">

<nav>
<div class="logo">🌤️ 萌萌天氣站</div>
<div class="tag">即時全球天氣</div>
</nav>

<div class="grid">

<section class="panel">

<div class="hero">
<div>
<div class="loc">📍 <span id="city">載入中...</span></div>
<h1>今天也要<br>晴朗可愛 ♡</h1>
</div>

<div class="big" id="mainEmoji">☀️</div>
</div>

<div class="search">
<input id="searchInput" placeholder="輸入任何城市，例如：台北、東京、巴黎、New York">
<button onclick="searchWeather()">查詢天氣</button>
</div>

<div class="loading" id="status"></div>

<div class="cards">

<div class="card sky">
<div style="font-size:28px">🌡️</div>
<div class="label">目前溫度</div>
<div class="value"><span id="temp">--</span>°C</div>
<div class="sub">體感 <span id="feel">--</span>°C</div>
</div>

<div class="card pink">
<div style="font-size:28px">☂️</div>
<div class="label">天氣狀態</div>
<div class="value" style="font-size:24px" id="condition">--</div>
<div class="sub">降雨機率 <span id="rain">--</span>%</div>
</div>

<div class="card green">
<div style="font-size:28px">💨</div>
<div class="label">濕度 / 風速</div>
<div class="value"><span id="humidity">--</span>%</div>
<div class="sub">風速 <span id="wind">--</span> km/h</div>
</div>

</div>
</section>

<aside class="panel">
<h2>每小時預報 ✨</h2>

<div class="hourly" id="hourly"></div>

<h2 style="margin-top:24px">一週預報 🗓️</h2>
<div class="weekly" id="weekly"></div>

<div class="reminder">
<b>今日小提醒</b><br>
天氣變化很快，記得保持好心情、補充水分，也別忘了帶著可愛出門！
</div>

</aside>

</div>

<footer>
使用 Open‑Meteo 免費天氣 API，可查詢全球城市 🌍
</footer>

</div>

<script>

function weatherEmoji(code){
if(code === 0) return ["☀️","大晴天"];
if([1,2].includes(code)) return ["🌤️","晴時多雲"];
if(code === 3) return ["☁️","陰天"];
if([45,48].includes(code)) return ["🌫️","有霧"];
if([51,53,55,61,63,65,80,81,82].includes(code)) return ["🌧️","下雨中"];
if([71,73,75,85,86].includes(code)) return ["❄️","下雪"];
if([95,96,99].includes(code)) return ["⛈️","雷雨"];
return ["🌈","天氣舒適"];
}

async function searchWeather(){

const query = document.getElementById("searchInput").value.trim();

if(!query){
alert("請輸入城市名稱");
return;
}

const status = document.getElementById("status");
status.innerText = "正在查詢天氣中...";

try{

const geoRes = await fetch(
`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=1&language=zh&format=json`
);

const geoData = await geoRes.json();

if(!geoData.results || geoData.results.length === 0){
status.innerText = "找不到這個城市 🥺";
return;
}

const city = geoData.results[0];

const weatherRes = await fetch(
`https://api.open-meteo.com/v1/forecast?latitude=${city.latitude}&longitude=${city.longitude}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&hourly=temperature_2m,precipitation_probability,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&forecast_days=7&timezone=auto`
);

const weather = await weatherRes.json();

const current = weather.current;
const hourly = weather.hourly;

const weatherInfo = weatherEmoji(current.weather_code);

document.getElementById("city").innerText =
`${city.name}${city.country ? "・" + city.country : ""}`;

document.getElementById("temp").innerText =
Math.round(current.temperature_2m);

document.getElementById("feel").innerText =
Math.round(current.apparent_temperature);

document.getElementById("humidity").innerText =
current.relative_humidity_2m;

document.getElementById("wind").innerText =
Math.round(current.wind_speed_10m);

document.getElementById("condition").innerText =
weatherInfo[1];

document.getElementById("mainEmoji").innerText =
weatherInfo[0];

document.getElementById("rain").innerText =
hourly.precipitation_probability[0] ?? 0;

const hourlyDiv = document.getElementById("hourly");

hourlyDiv.innerHTML = "";

for(let i=0;i<6;i++){

const hour = hourly.time[i].split("T")[1];
const temp = Math.round(hourly.temperature_2m[i]);
const emoji = weatherEmoji(hourly.weather_code[i])[0];

hourlyDiv.innerHTML += `
<div class="hour">
<div class="hourLeft">
<div class="emoji">${emoji}</div>
<div>
<div style="font-weight:900">${hour}</div>
<div style="font-size:13px;color:#94a3b8">軟綿綿天氣提醒</div>
</div>
</div>

<div class="temp">${temp}°</div>
</div>
`;
}

const weeklyDiv = document.getElementById("weekly");
weeklyDiv.innerHTML = "";

const weekNames = ["週日","週一","週二","週三","週四","週五","週六"];

for(let i=0;i<weather.daily.time.length;i++){

const date = new Date(weather.daily.time[i]);
const dayName = i === 0 ? "今天" : weekNames[date.getDay()];
const dailyEmoji = weatherEmoji(weather.daily.weather_code[i])[0];
const high = Math.round(weather.daily.temperature_2m_max[i]);
const low = Math.round(weather.daily.temperature_2m_min[i]);
const rainMax = weather.daily.precipitation_probability_max[i] ?? 0;

weeklyDiv.innerHTML += `
<div class="day">
<div class="dayName">${dayName}</div>
<div class="dayEmoji">${dailyEmoji}</div>
<div class="dayTemp">${high}° / <span class="low">${low}°</span></div>
<div class="low">降雨 ${rainMax}%</div>
</div>
`;
}

status.innerText = "查詢成功 ✨";

}catch(error){

console.error(error);
status.innerText = "天氣資料載入失敗 😭";

}

}

searchWeather = searchWeather.bind(window);

window.onload = () => {
document.getElementById("searchInput").value = "台北";
searchWeather();
};

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>萌萌天氣站</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
  color:#172033;
  background:linear-gradient(135deg,#c9f0ff 0%,#f8fcff 46%,#fff2f8 76%,#fff4bd 100%);
}
.page{
  width:min(760px,calc(100% - 22px));
  margin:auto;
  padding:14px 0 22px;
}
.card{
  background:rgba(255,255,255,.88);
  border-radius:30px;
  box-shadow:0 18px 46px rgba(70,130,170,.14);
  backdrop-filter:blur(12px);
}
.topbar{
  display:grid;
  grid-template-columns:auto 1fr auto;
  gap:14px;
  align-items:center;
  padding:16px 20px;
  margin-bottom:16px;
}
.logo{
  display:flex;
  align-items:center;
  gap:10px;
  color:#ec4899;
  font-size:clamp(25px,6vw,40px);
  font-weight:950;
  white-space:nowrap;
}
.logo-sun{
  width:48px;height:48px;
  border-radius:50%;
  display:grid;place-items:center;
  background:#ffe066;
  border:4px solid #172033;
  box-shadow:0 0 0 6px #fff5b7;
  font-size:28px;
}
.search{
  display:grid;
  grid-template-columns:1fr auto;
  gap:10px;
}
.search input{
  min-width:0;
  border:2px solid #e7eef6;
  border-radius:18px;
  padding:15px 18px;
  outline:none;
  font-size:18px;
  background:#fff;
  color:#172033;
}
.search button{
  border:0;
  border-radius:18px;
  padding:0 26px;
  background:#ec4899;
  color:white;
  font-weight:950;
  font-size:18px;
  cursor:pointer;
  box-shadow:inset 0 -4px 0 rgba(0,0,0,.17);
}
.pill{
  background:#ffe69d;
  color:#b45309;
  font-weight:950;
  border-radius:999px;
  padding:12px 17px;
  white-space:nowrap;
}
.hero{
  padding:24px;
  margin-bottom:16px;
}
.hero-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:18px;
}
.status{
  background:#dcfce7;
  color:#15803d;
  border-radius:999px;
  padding:12px 18px;
  font-weight:950;
  white-space:nowrap;
}
.question{
  background:#fce7f3;
  color:#be185d;
  border-radius:999px;
  padding:12px 18px;
  font-weight:950;
}
.hero-body{
  display:grid;
  grid-template-columns:.86fr 1.14fr;
  align-items:center;
  gap:20px;
}
.hero h1{
  margin:0;
  font-size:clamp(28px,6.4vw,46px);
  line-height:1.16;
  letter-spacing:-1.5px;
  white-space:nowrap;
}
.pink{color:#ec4899}
.hero-photo{
  width:100%;
  height:270px;
  border-radius:22px;
  object-fit:cover;
  object-position:center;
  box-shadow:0 12px 28px rgba(15,23,42,.12);
}
.weather{
  padding:26px 26px 24px;
  margin-bottom:16px;
}
.location{
  font-size:25px;
  font-weight:950;
  margin-bottom:18px;
}
.current{
  display:grid;
  grid-template-columns:1.05fr .95fr;
  gap:22px;
  align-items:center;
}
.temp{
  font-size:clamp(78px,20vw,122px);
  font-weight:950;
  line-height:.9;
  letter-spacing:-5px;
}
.condition{
  display:flex;
  align-items:center;
  gap:12px;
  margin-top:18px;
  font-size:28px;
  font-weight:950;
}
.condition-emoji{font-size:58px}
.stats{
  border-left:2px solid #e5edf5;
  padding-left:28px;
  display:grid;
  gap:22px;
}
.stat{
  display:grid;
  grid-template-columns:40px 1fr auto;
  align-items:center;
  gap:10px;
  font-size:22px;
  font-weight:900;
}
.stat .icon{font-size:32px}
.weekly{
  margin-top:26px;
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
}
.day{
  background:rgba(255,255,255,.78);
  border:2px solid #edf4fb;
  border-radius:16px;
  text-align:center;
  padding:12px 6px;
  min-width:0;
}
.day-name{font-weight:950;font-size:17px}
.day-date{font-size:14px;color:#64748b;margin-top:2px}
.day-emoji{font-size:33px;margin:9px 0}
.day-temp{font-size:16px;font-weight:950}
.low{color:#60a5fa}
.mini-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:0;
  overflow:hidden;
  border-radius:22px;
  margin-top:22px;
}
.mini{
  min-height:110px;
  display:grid;
  grid-template-columns:auto 1fr;
  gap:12px;
  align-items:center;
  padding:18px;
}
.mini:nth-child(1){background:linear-gradient(135deg,#fff1f2,#fff)}
.mini:nth-child(2){background:linear-gradient(135deg,#fff7d6,#fff)}
.mini:nth-child(3){background:linear-gradient(135deg,#e8fff1,#fff)}
.mini-icon{font-size:42px}
.mini-title{font-weight:900;color:#64748b}
.mini-value{font-size:31px;font-weight:950}
.gallery{
  padding:22px;
}
.gallery-title{
  font-size:25px;
  font-weight:950;
  margin-bottom:16px;
}
.photos{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:12px;
}
.photo{
  height:112px;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 8px 18px rgba(15,23,42,.10);
}
.photo img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.footer{
  text-align:center;
  margin-top:18px;
  color:#54708d;
  font-weight:800;
}
@media(max-width:720px){
  .page{width:calc(100% - 20px);padding:10px 0 16px}
  .topbar{
    grid-template-columns:1fr;
    padding:14px;
    border-radius:26px;
  }
  .logo{font-size:34px}
  .search{grid-template-columns:1fr auto}
  .search input{font-size:16px;padding:13px}
  .search button{font-size:16px;padding:0 18px}
  .pill{display:none}
  .hero{padding:18px;border-radius:26px}
  .hero-head{gap:8px;margin-bottom:14px}
  .status,.question{font-size:15px;padding:9px 13px}
  .hero-body{
    grid-template-columns:1fr 1.25fr;
    gap:12px;
  }
  .hero h1{font-size:29px;letter-spacing:-1px}
  .hero-photo{height:190px;border-radius:18px}
  .weather{padding:18px;border-radius:26px}
  .location{font-size:22px;margin-bottom:12px}
  .current{grid-template-columns:1fr 1fr;gap:12px}
  .temp{font-size:82px;letter-spacing:-4px}
  .condition{font-size:21px;margin-top:9px}
  .condition-emoji{font-size:42px}
  .stats{gap:14px;padding-left:16px}
  .stat{grid-template-columns:30px 1fr auto;font-size:17px;gap:8px}
  .stat .icon{font-size:26px}
  .weekly{gap:5px;margin-top:18px}
  .day{padding:8px 3px;border-radius:12px}
  .day-name{font-size:13px}
  .day-date{font-size:11px}
  .day-emoji{font-size:24px;margin:7px 0}
  .day-temp{font-size:13px}
  .mini-grid{margin-top:16px;border-radius:18px}
  .mini{min-height:78px;padding:10px;gap:7px}
  .mini-icon{font-size:30px}
  .mini-title{font-size:13px}
  .mini-value{font-size:22px}
  .gallery{padding:16px;border-radius:26px}
  .gallery-title{font-size:21px;margin-bottom:12px}
  .photos{grid-template-columns:repeat(6,1fr);gap:7px}
  .photo{height:72px;border-radius:12px}
  .footer{font-size:13px;margin-top:12px}
}
@media(max-width:420px){
  .logo{font-size:29px}
  .logo-sun{width:40px;height:40px;font-size:23px}
  .hero-body{grid-template-columns:1fr 1.15fr}
  .hero h1{font-size:25px}
  .hero-photo{height:160px}
  .temp{font-size:70px}
  .stat{font-size:15px}
  .weekly{grid-template-columns:repeat(7,1fr)}
  .day-temp{font-size:12px}
  .photos{grid-template-columns:repeat(3,1fr)}
  .photo{height:82px}
}
</style>
</head>

<script>
function weatherEmoji(code){
  if(code===0)return["☀️","大晴天"];
  if([1,2].includes(code))return["🌤️","晴時多雲"];
  if(code===3)return["☁️","陰天"];
  if([45,48].includes(code))return["🌫️","有霧"];
  if([51,53,55,61,63,65,80,81,82].includes(code))return["🌧️","下雨中"];
  if([71,73,75,85,86].includes(code))return["❄️","下雪"];
  if([95,96,99].includes(code))return["⛈️","雷雨"];
  return["🌈","天氣舒適"];
}
const cityMap={
  "台北":"Taipei","臺北":"Taipei","台北市":"Taipei","臺北市":"Taipei",
  "新北":"New Taipei","新北市":"New Taipei","台中":"Taichung","臺中":"Taichung",
  "高雄":"Kaohsiung","台南":"Tainan","臺南":"Tainan","桃園":"Taoyuan",
  "新竹":"Hsinchu","宜蘭":"Yilan","花蓮":"Hualien","台東":"Taitung",
  "東京":"Tokyo","大阪":"Osaka","京都":"Kyoto","首爾":"Seoul",
  "香港":"Hong Kong","新加坡":"Singapore","巴黎":"Paris","倫敦":"London",
  "紐約":"New York","洛杉磯":"Los Angeles","舊金山":"San Francisco",
  "雪梨":"Sydney","墨爾本":"Melbourne"
};
function setTips(code,rain){
  const uv=document.getElementById("uvTip");
  const mood=document.getElementById("moodTip");
  if(rain>=60||[51,53,55,61,63,65,80,81,82,95,96,99].includes(code)){
    uv.innerText="偏低"; mood.innerText="帶傘";
  }else if(code===0||code===1){
    uv.innerText="中高"; mood.innerText="良好";
  }else{
    uv.innerText="中等"; mood.innerText="良好";
  }
}
async function searchWeather(){
  const query=document.getElementById("searchInput").value.trim();
  if(!query){alert("請輸入城市名稱");return;}
  const finalQuery=cityMap[query]||query;
  const status=document.getElementById("status");
  status.innerText="查詢中...";
  try{
    const geoRes=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(finalQuery)}&count=1&language=en&format=json`);
    const geoData=await geoRes.json();
    if(!geoData.results||geoData.results.length===0){status.innerText="找不到城市 🥺";return;}
    const city=geoData.results[0];
    const weatherRes=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${city.latitude}&longitude=${city.longitude}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&forecast_days=7&timezone=auto`);
    const weather=await weatherRes.json();
    const current=weather.current;
    const daily=weather.daily;
    const info=weatherEmoji(current.weather_code);
    const todayRain=daily.precipitation_probability_max[0]??0;

    document.getElementById("city").innerText=`${query} → ${city.name}・${city.country}`;
    document.getElementById("temp").innerText=Math.round(current.temperature_2m);
    document.getElementById("feel").innerText=Math.round(current.apparent_temperature);
    document.getElementById("humidity").innerText=current.relative_humidity_2m;
    document.getElementById("wind").innerText=Math.round(current.wind_speed_10m);
    document.getElementById("condition").innerText=info[1];
    document.getElementById("mainEmoji").innerText=info[0];
    document.getElementById("rain").innerText=todayRain;
    setTips(current.weather_code,todayRain);

    const weekly=document.getElementById("weekly");
    weekly.innerHTML="";
    const weekNames=["週日","週一","週二","週三","週四","週五","週六"];
    for(let i=0;i<daily.time.length;i++){
      const date=new Date(daily.time[i]);
      const dayName=i===0?"今天":weekNames[date.getDay()];
      const monthDate=`${date.getMonth()+1}/${date.getDate()}`;
      const emoji=weatherEmoji(daily.weather_code[i])[0];
      const high=Math.round(daily.temperature_2m_max[i]);
      const low=Math.round(daily.temperature_2m_min[i]);
      weekly.innerHTML+=`
        <div class="day">
          <div class="day-name">${dayName}</div>
          <div class="day-date">${monthDate}</div>
          <div class="day-emoji">${emoji}</div>
          <div class="day-temp">${high}° / <span class="low">${low}°</span></div>
        </div>
      `;
    }
    status.innerText="查詢成功 ✨";
  }catch(e){
    console.error(e);
    status.innerText="載入失敗 😭";
  }
}
window.onload=searchWeather;
</script>
</body>
</html>
